---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netology-deployment2
  labels:
    task: two
  annotations:
    container: nginx
    container-init: busybox
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: nginx-init
  template:
    metadata:
      labels:
        app: nginx-init
    spec:
      containers:
        - name: nginx
          image: nginx:1.24.0
          ports:
            - name: web
              containerPort: 80
      initContainers:
        - name: busybox
          image: busybox:1.36.1
          env:
            - name: TARGET
              value: "netology-deployment2"
          command: ['sh', '-c', "until nslookup $TARGET.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do sleep 2; done"]
