---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: test-pv
spec:
  capacity:
    storage: 10Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local
  hostPath:
    path:  /data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-hostpath
  namespace: nl-task2-1
  labels:
    type: custom-pv
spec:
  storageClassName: "local"
  accessModes:
  - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvolume
  labels:
    task: two
  annotations:
    container1: multitool
    container2: busybox
  namespace: nl-task2-1
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      type: pv
  template:
    metadata:
      labels:
        app: multitool
        type: pv
    spec:
      containers:
        - name: multitool
          image: praqma/network-multitool:alpine-extra
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: HTTPS_PORT
              value: "8443"
          ports:
            - name: http-multitool
              containerPort: 8080
              protocol: TCP
            - name: https-multitool
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name:  test-vol-1
              mountPath: "/data"
        - name: busy-writer
          image: busybox:1.36.1
          env:
            - name: TARGET
              value: "file-netology"
          command: ['sh', '-c', "until false; do date >> /data/$TARGET.txt; sleep 5; done"]
          volumeMounts:
            - name:  test-vol-1
              mountPath: "/data"
      volumes:
        - name:  test-vol-1
          persistentVolumeClaim:
            claimName: pvc-hostpath