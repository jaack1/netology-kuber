### DEPLOYMENT ###
labels:
  tier: homework
replicaCount: 1
containers:
  image:  nginx
  name:  nginx
  tag: ""
  port: 80
### SERVICE ###
svc:
  port: 80
  type: ClusterIP

### INGRESS ###
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: netology-test
      paths:
        - path: /
          pathType: Prefix
  tls: 
    crt: 
    key: 